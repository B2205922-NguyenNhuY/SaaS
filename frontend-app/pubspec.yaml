name: frontend
description: "MarketHub Admin Dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  fl_chart: ^0.55.2
  go_router: ^14.2.1
  http: ^1.6.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.4
  provider: ^6.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2
  flutter_local_notifications: ^21.0.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  firebase_messaging: ^14.9.4
  jwt_decoder: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logoApp.png"
